# =============================================================================
# Site Information
# =============================================================================
title: "Ahmad Hasan Sakib | Computational Physics & Nonlinear Optics"
description: "Official website of Ahmad Hasan Sakib, a Physics Researcher specializing in Nonlinear Optics, Machine Learning, and Computational Physics."
url: "https://ahmad-sakib.github.io"
baseurl: ""
repository: "ahmad-sakib/ahmad-sakib.github.io"
teaser: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200&q=80"
logo:
locale: "en-US"
keywords: "Computational Physics, Nonlinear Optics, Machine Learning, Physics Scholar, SUST, AI in Physics, Ahmad Hasan Sakib"

# =============================================================================
# Author Information
# =============================================================================
author:
  name: "Ahmad Hasan Sakib"
  avatar: "/assets/images/sakib.jpeg"
  bio: "Physics Researcher at SUST | Nonlinear Optics & Machine Learning"
  location: "Sylhet, Bangladesh"
  email: "ahmadhasansakib7@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ahmad-sakib"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/ahmad-hasan-sakib"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com"

# =============================================================================
# Theme
# =============================================================================
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "dark"

# =============================================================================
# Search
# =============================================================================
search: true
search_full_content: true
search_provider: lunr

# =============================================================================
# Breadcrumbs
# =============================================================================
breadcrumbs: false

# =============================================================================
# Footer
# =============================================================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ahmad-sakib"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/ahmad-hasan-sakib"

# =============================================================================
# Plugins
# =============================================================================
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-paginate

# =============================================================================
# SEO & Social
# =============================================================================
twitter:
  username: "AhmadSakib"
  card: summary_large_image
facebook:
  publisher: "AhmadHasanSakib"
  app_id:
  publisher_id:
og_image: "/assets/images/sakib.jpeg"

# =============================================================================
# Pagination
# =============================================================================
paginate: 5
paginate_path: /blog/page:num/

# =============================================================================
# Collections
# =============================================================================
collections:
  pages:
    output: true
    permalink: /:path/

# =============================================================================
# Markdown & Syntax Highlighting
# =============================================================================
markdown: kramdown
kramdown:
  math_engine: mathjax
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# =============================================================================
# Defaults
# =============================================================================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: true
      share: true
      related: true
      mathjax: true
      show_date: true
      toc: true
      toc_sticky: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      read_time: false
      related: false
      mathjax: true
      toc: true
      toc_sticky: true

# =============================================================================
# Exclusions
# =============================================================================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemini.md
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .github/
  - .git/
  - .gitignore
  - README.md